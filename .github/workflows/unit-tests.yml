name: Unit Tests (standalone)

on:
  workflow_dispatch:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Colab test image
        run: docker build -t nb-test .

      - name: Run pytest
        run: |
          mkdir -p results
          docker run --rm -v "$PWD/results:/workspace/results" nb-test bash -c "
            pytest tests/ -v --import-mode=importlib --tb=short \
              2>&1 | tee /workspace/results/pytest_output.txt
          "

      - name: Write job summary
        if: always()
        run: |
          echo "## Unit Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat results/pytest_output.txt >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || echo "No output." >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
