name: Notebook Import & Syntax Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Nightly at 03:00 UTC.
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  check-notebooks:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Build Colab test image
        run: docker build -t nb-test .

      - name: Check notebook syntax and imports
        run: |
          mkdir -p results
          docker run --rm -v "$PWD/results:/workspace/results" nb-test bash -c "
            python scripts/generate_manifest.py;
            python scripts/check_notebook.py --all --skip-gpu \
              --summary /workspace/results/notebook_summary.md
          "

      - name: Write job summary
        if: always()
        run: cat results/notebook_summary.md >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || true
