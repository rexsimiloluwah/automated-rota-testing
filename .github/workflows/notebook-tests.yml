name: Notebook Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Nightly at 02:00 UTC.
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  COLAB_GPU_IMAGE: us-docker.pkg.dev/colab-images/public/runtime
  GCE_ZONE: us-central1-a

jobs:
  cpu-unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache/CodeQL /usr/local/share/boost
          sudo docker image prune -af
          df -h

      - name: Build Colab test image
        run: docker build -t nb-test .

      - name: Run pytest
        run: |
          mkdir -p results
          docker run --rm -v "$PWD/results:/workspace/results" nb-test bash -c "
            pytest tests/ -v --import-mode=importlib --tb=short \
              2>&1 | tee /workspace/results/pytest_output.txt
          "

      - name: Parse results
        if: always()
        run: |
          docker run --rm -v "$PWD/results:/workspace/results" -v "$PWD/scripts:/workspace/scripts" nb-test bash -c "
            python /workspace/scripts/write_results.py \
              --pytest-output /workspace/results/pytest_output.txt \
              --output /workspace/results/results.json \
              --job-name 'Unit Tests'
          "

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: results/

  cpu-notebook-import-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache/CodeQL /usr/local/share/boost
          sudo docker image prune -af
          df -h

      - name: Build Colab test image
        run: docker build -t nb-test .

      - name: Check notebooks
        run: |
          mkdir -p results
          docker run --rm -v "$PWD/results:/workspace/results" nb-test bash -c "
            python scripts/generate_manifest.py;
            python scripts/check_notebook.py --all --skip-gpu \
              --summary /workspace/results/notebook_summary.md
          "

      - name: Parse results
        if: always()
        run: |
          docker run --rm -v "$PWD/results:/workspace/results" -v "$PWD/scripts:/workspace/scripts" nb-test bash -c "
            python /workspace/scripts/write_results.py \
              --notebook-summary /workspace/results/notebook_summary.md \
              --output /workspace/results/results.json \
              --job-name 'Notebook Imports'
          "

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: notebook-import-results
          path: results/

  cpu-smoke-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache/CodeQL /usr/local/share/boost
          sudo docker image prune -af
          df -h

      - name: Build Colab test image
        run: docker build -t nb-test .

      - name: Run smoke tests
        run: |
          mkdir -p results
          docker run --rm -v "$PWD/results:/workspace/results" nb-test bash -c "
            pytest tests/ -v --import-mode=importlib --tb=short \
              2>&1 | tee /workspace/results/pytest_output.txt;
            python scripts/generate_manifest.py;
            python scripts/check_notebook.py --all --skip-gpu \
              --summary /workspace/results/notebook_summary.md
          "

      - name: Parse results
        if: always()
        run: |
          docker run --rm -v "$PWD/results:/workspace/results" -v "$PWD/scripts:/workspace/scripts" nb-test bash -c "
            python /workspace/scripts/write_results.py \
              --pytest-output /workspace/results/pytest_output.txt \
              --notebook-summary /workspace/results/notebook_summary.md \
              --output /workspace/results/results.json \
              --job-name 'Smoke Tests'
          "

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: notebook-smoke-results
          path: results/

  # CPU notebook execution — runs all CPU notebooks end-to-end with
  # solutions injected. Only on nightly schedule and manual dispatch.
  cpu-full-notebook-execution:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache/CodeQL /usr/local/share/boost
          sudo docker image prune -af
          df -h

      - name: Build Colab test image
        run: docker build -t nb-test .

      - name: Execute CPU notebooks
        run: |
          mkdir -p results
          docker run --rm -v "$PWD/results:/workspace/results" nb-test bash -c "
            python scripts/generate_manifest.py;
            python scripts/run_all_notebooks.py \
              --repo-dir ai-foundations \
              --output-dir /workspace/results/notebooks \
              --mode cpu \
              --strip-installs \
              --summary /workspace/results/execution_summary.md
          "

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: notebook-execution-results
          path: results/

  # GPU: pytest + syntax/import checks on GCE T4. Runs on every push/PR.
  gpu-notebook-import-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 75

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Set instance name
        run: echo "INSTANCE_NAME=nb-gpu-ci-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" >> "$GITHUB_ENV"

      - name: Create GCE instance
        run: |
          gcloud compute instances create "$INSTANCE_NAME" \
            --zone="$GCE_ZONE" \
            --machine-type=n1-standard-4 \
            --accelerator=type=nvidia-tesla-t4,count=1 \
            --maintenance-policy=TERMINATE \
            --image-family=pytorch-2-9-cu129-ubuntu-2204-nvidia-580 \
            --image-project=deeplearning-platform-release \
            --boot-disk-size=100GB \
            --boot-disk-type=pd-ssd \
            --network=similoluwa-vpc \
            --subnet=similoluwa-vpc \
            --metadata-from-file=startup-script=scripts/gce_startup.sh \
            --metadata=install-nvidia-driver=True \
            --scopes=cloud-platform \
            --tags=allow-ssh \
            --quiet

      - name: Wait for SSH
        run: |
          for i in $(seq 1 12); do
            if gcloud compute ssh "$INSTANCE_NAME" --zone="$GCE_ZONE" --quiet \
              --ssh-flag="-o StrictHostKeyChecking=no" \
              --ssh-flag="-o ConnectTimeout=10" \
              --command="echo SSH_OK" 2>/dev/null | grep -q "SSH_OK"; then
              echo "SSH available."; exit 0
            fi
            echo "Waiting for SSH... ($((i * 10))s)"; sleep 10
          done
          echo "Error: SSH not available after 120s."; exit 1

      - name: Wait for startup script
        run: |
          for i in $(seq 1 90); do
            if gcloud compute ssh "$INSTANCE_NAME" --zone="$GCE_ZONE" --quiet \
              --ssh-flag="-o StrictHostKeyChecking=no" \
              --ssh-flag="-o ConnectTimeout=10" \
              --command="test -f /workspace/.ready && echo READY" \
              2>/dev/null | grep -q "READY"; then
              echo "Instance is ready."; exit 0
            fi
            echo "Waiting for startup... ($((i * 20))s)"; sleep 20
          done
          echo "Error: startup did not complete within 1800s."; exit 1

      - name: Copy project files
        run: |
          gcloud compute scp --recurse --zone="$GCE_ZONE" --quiet \
            --strict-host-key-checking=no \
            scripts tests pyproject.toml notebook_overrides.yml \
            "$INSTANCE_NAME":/workspace/

      - name: Install dependencies and run tests
        run: |
          gcloud compute ssh "$INSTANCE_NAME" --zone="$GCE_ZONE" --quiet \
            --ssh-flag="-o StrictHostKeyChecking=no" \
            --command="sudo docker run --rm --gpus=all \
              --entrypoint '' \
              -v /workspace:/workspace \
              $COLAB_GPU_IMAGE \
              bash -c 'bash /workspace/scripts/gce_install_deps.sh && \
                cd /workspace && mkdir -p results && \
                pytest tests/ -v --import-mode=importlib --tb=short \
                  2>&1 | tee /workspace/results/pytest_output.txt; \
                python scripts/generate_manifest.py \
                  --repo-dir ai-foundations \
                  --overrides notebook_overrides.yml; \
                python scripts/check_notebook.py --all --repo-dir ai-foundations \
                  --summary /workspace/results/notebook_summary.md; \
                python scripts/write_results.py \
                  --pytest-output /workspace/results/pytest_output.txt \
                  --notebook-summary /workspace/results/notebook_summary.md \
                  --output /workspace/results/results.json \
                  --job-name \"GPU Tests\"'"

      - name: Copy results back
        if: always()
        run: |
          mkdir -p results
          gcloud compute scp --zone="$GCE_ZONE" --quiet \
            --strict-host-key-checking=no \
            "$INSTANCE_NAME":/workspace/results/results.json \
            results/results.json 2>/dev/null || true
          gcloud compute scp --zone="$GCE_ZONE" --quiet \
            --strict-host-key-checking=no \
            "$INSTANCE_NAME":/workspace/results/pytest_output.txt \
            results/pytest_output.txt 2>/dev/null || true
          gcloud compute scp --zone="$GCE_ZONE" --quiet \
            --strict-host-key-checking=no \
            "$INSTANCE_NAME":/workspace/results/notebook_summary.md \
            results/notebook_summary.md 2>/dev/null || true

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gpu-test-results
          path: results/

      - name: Delete GCE instance
        if: always()
        run: |
          gcloud compute instances delete "$INSTANCE_NAME" \
            --zone="$GCE_ZONE" --quiet 2>/dev/null || true

  # GPU notebook execution — full end-to-end execution on GCE T4.
  # Only on nightly schedule and manual dispatch.
  gpu-full-notebook-execution:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Set instance name
        run: echo "INSTANCE_NAME=nb-gpu-exec-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" >> "$GITHUB_ENV"

      - name: Create GCE instance
        run: |
          gcloud compute instances create "$INSTANCE_NAME" \
            --zone="$GCE_ZONE" \
            --machine-type=n1-standard-4 \
            --accelerator=type=nvidia-tesla-t4,count=1 \
            --maintenance-policy=TERMINATE \
            --image-family=pytorch-2-9-cu129-ubuntu-2204-nvidia-580 \
            --image-project=deeplearning-platform-release \
            --boot-disk-size=100GB \
            --boot-disk-type=pd-ssd \
            --network=similoluwa-vpc \
            --subnet=similoluwa-vpc \
            --metadata-from-file=startup-script=scripts/gce_startup.sh \
            --metadata=install-nvidia-driver=True \
            --scopes=cloud-platform \
            --tags=allow-ssh \
            --quiet

      - name: Wait for SSH
        run: |
          for i in $(seq 1 12); do
            if gcloud compute ssh "$INSTANCE_NAME" --zone="$GCE_ZONE" --quiet \
              --ssh-flag="-o StrictHostKeyChecking=no" \
              --ssh-flag="-o ConnectTimeout=10" \
              --command="echo SSH_OK" 2>/dev/null | grep -q "SSH_OK"; then
              echo "SSH available."; exit 0
            fi
            echo "Waiting for SSH... ($((i * 10))s)"; sleep 10
          done
          echo "Error: SSH not available after 120s."; exit 1

      - name: Wait for startup script
        run: |
          for i in $(seq 1 90); do
            if gcloud compute ssh "$INSTANCE_NAME" --zone="$GCE_ZONE" --quiet \
              --ssh-flag="-o StrictHostKeyChecking=no" \
              --ssh-flag="-o ConnectTimeout=10" \
              --command="test -f /workspace/.ready && echo READY" \
              2>/dev/null | grep -q "READY"; then
              echo "Instance is ready."; exit 0
            fi
            echo "Waiting for startup... ($((i * 20))s)"; sleep 20
          done
          echo "Error: startup did not complete within 1800s."; exit 1

      - name: Copy project files
        run: |
          gcloud compute scp --recurse --zone="$GCE_ZONE" --quiet \
            --strict-host-key-checking=no \
            scripts tests pyproject.toml notebook_overrides.yml \
            "$INSTANCE_NAME":/workspace/

      - name: Execute GPU notebooks
        run: |
          gcloud compute ssh "$INSTANCE_NAME" --zone="$GCE_ZONE" --quiet \
            --ssh-flag="-o StrictHostKeyChecking=no" \
            --command="sudo docker run --rm --gpus=all \
              --entrypoint '' \
              -v /workspace:/workspace \
              $COLAB_GPU_IMAGE \
              bash -c 'bash /workspace/scripts/gce_install_deps.sh && \
                cd /workspace && mkdir -p results && \
                python scripts/generate_manifest.py \
                  --repo-dir ai-foundations \
                  --overrides notebook_overrides.yml; \
                python scripts/run_all_notebooks.py \
                  --repo-dir ai-foundations \
                  --overrides notebook_overrides.yml \
                  --output-dir /workspace/results/notebooks \
                  --mode gpu \
                  --strip-installs \
                  --summary /workspace/results/execution_summary.md'"

      - name: Copy results back
        if: always()
        run: |
          mkdir -p results
          gcloud compute scp --zone="$GCE_ZONE" --quiet \
            --strict-host-key-checking=no \
            "$INSTANCE_NAME":/workspace/results/execution_summary.md \
            results/execution_summary.md 2>/dev/null || true

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gpu-full-notebook-execution-results
          path: results/

      - name: Delete GCE instance
        if: always()
        run: |
          gcloud compute instances delete "$INSTANCE_NAME" \
            --zone="$GCE_ZONE" --quiet 2>/dev/null || true

  report:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: always()
    needs: [cpu-unit-tests, cpu-notebook-import-checks, cpu-smoke-tests, cpu-full-notebook-execution, gpu-notebook-import-checks, gpu-full-notebook-execution]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-results/

      - name: Write GitHub summary
        run: |
          # CPU Unit Test Results
          echo "## CPU Unit Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat all-results/unit-test-results/pytest_output.txt >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || echo "No output." >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          # CPU Notebook Import Checks
          echo "## CPU Notebook Import Checks" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          cat all-results/notebook-import-results/notebook_summary.md >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || echo "No output." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          # CPU Smoke Tests
          echo "## CPU Smoke Tests" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat all-results/notebook-smoke-results/pytest_output.txt >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || echo "No output." >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          cat all-results/notebook-smoke-results/notebook_summary.md >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || true
          echo "" >> "$GITHUB_STEP_SUMMARY"

          # CPU Full Notebook Execution
          echo "## CPU Full Notebook Execution" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -d "all-results/notebook-execution-results" ]; then
            cat all-results/notebook-execution-results/execution_summary.md >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || echo "No output." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Not run for this trigger (nightly and manual dispatch only)." >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "" >> "$GITHUB_STEP_SUMMARY"

          # GPU Notebook Import Checks
          echo "## GPU Notebook Import Checks" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -d "all-results/gpu-test-results" ]; then
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            cat all-results/gpu-test-results/pytest_output.txt >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || echo "No output." >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            cat all-results/gpu-test-results/notebook_summary.md >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || true
          else
            echo "GPU tests not enabled for this run." >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "" >> "$GITHUB_STEP_SUMMARY"

          # GPU Full Notebook Execution
          echo "## GPU Full Notebook Execution" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -d "all-results/gpu-full-notebook-execution-results" ]; then
            cat all-results/gpu-full-notebook-execution-results/execution_summary.md >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || echo "No output." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Not run for this trigger (nightly and manual dispatch only)." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install sheets dependencies
        run: pip install gspread google-auth google-api-python-client

      # Authenticate for Google Sheets.
      - name: Authenticate to Google Cloud
        if: env.WRITE_SHEETS == 'true'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Write to Google Sheets
        if: env.WRITE_SHEETS == 'true'
        run: |
          python scripts/write_to_sheets.py \
            --results-dir all-results/ \
            --spreadsheet-id "${{ secrets.GOOGLE_SPREADSHEET_ID }}" \
            --run-id "${{ github.run_id }}" \
            --run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

    env:
      # Set to 'true' when WIF and Drive folder are configured.
      WRITE_SHEETS: 'true'
